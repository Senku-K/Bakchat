<!DOCTYPE html>
{% load static %}

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakchat - Bakchodikachoda</title>

    <!-- Adding basic CSS to improve UI -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            color: #4CAF50;
            padding: 20px;
            background-color: #1e1e1e;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        #chat-box {
            border: 1px solid #333;
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            background-color: #1e1e1e;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .message {
            padding: 10px;
            border-bottom: 1px solid #444;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        input[type="text"], #send-btn {
            transition: all 0.3s ease-in-out;
            background-color: #1e1e1e;
            color: #e0e0e0;
            border: 1px solid #4CAF50;
            padding: 10px;
            border-radius: 5px;
        }

        input[type="text"]:focus {
            border-color: #66ff66;
            box-shadow: 0 0 5px rgba(102, 255, 102, 0.5);
        }

        input[type="text"]:hover {
            border-color: #66ff66;
        }

        #send-btn {
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
        }

        #send-btn:hover {
            background-color: #66ff66;
            transform: scale(1.05);
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #1e1e1e;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Bakchodikachoda!</h1>
        <p>Your username: <input type="text" id="username" placeholder="Enter your name"></p>

        <div>
            <h3>Messages:</h3>
            <div id="chat-box">
                {% for message in messages %}
                    <div class="message">
                        <div class="message-content">
                            <p><span class="username">{{ message.user.username }}:</span> {{ message.content }}</p>
                        </div>
                        <div class="timestamp">
                            <small>{{ message.timestamp|date:"d/m/Y, H:i:s" }}</small>
                        </div>
                    </div>
                {% empty %}
                    <p>No messages yet. Start the conversation!</p>
                {% endfor %}
            </div>
        </div>

        <div>
            <input type="text" id="message" placeholder="Type your message">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <!-- Linking JavaScript -->
    <script src="{% static 'js/chat.js' %}"></script>
</body>
</html>
